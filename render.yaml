services:
  - type: web
    name: sarvam-ai-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SARVAM_AI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: ENABLE_REAL_CALLS
        value: "true"
      - key: MAX_REAL_CALLS_PER_DAY
        value: "2"
      - key: MAX_CONVERSATION_TURNS
        value: "10"
